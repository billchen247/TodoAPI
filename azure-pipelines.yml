# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- main

pool:
  #vmImage: 'windows-latest'
  name: COMP367-Wins # choose selfhost agent pool


variables:
  solution: '**/*.sln'
  buildConfiguration: 'Release'
  outputDir: '$(Build.ArtifactStagingDirectory)/publish'

steps:

# ✅ Install .NET 8 SDK
- task: UseDotNet@2
  displayName: 'Install .NET 8 SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# ✅ Restore dependencies
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '$(solution)'

# ✅ Build
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration)'

# ✅ Run tests
- task: DotNetCoreCLI@2
  displayName: 'Test'
  inputs:
    command: 'test'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration)'

# ✅ Publish (this replaces your old MSBuild packaging)
- task: DotNetCoreCLI@2
  displayName: 'Publish API'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '--configuration $(buildConfiguration) --output $(outputDir)'
    zipAfterPublish: true

# ✅ Publish pipeline artifact
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact'
  inputs:
    PathtoPublish: '$(outputDir)'
    ArtifactName: 'todoAPI3'
    publishLocation: 'Container'

# ✅ Pack NuGet (if you actually need it)
- task: DotNetCoreCLI@2
  displayName: 'Pack NuGet'
  inputs:
    command: 'pack'
    packagesToPack: '**/*.csproj'
    versioningScheme: 'byPrereleaseNumber'

# ✅ Push to Azure Artifacts
- task: NuGetCommand@2
  displayName: NuGet push to artifact nuget feeds
  inputs:
    command: push
    feedPublish: c9f2b76d-54b1-4410-b1d0-876ea67ed0ad # comp367demofeeds # using nuget feed id not name here
